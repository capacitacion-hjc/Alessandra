<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Invitación Digital</title>

    <meta name="description" content="Invitación Digital Premium">
    <meta name="theme-color" content="#0b0b0b">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- PRELOADER -->
    <!-- ========================= -->

    <div id="preloader">

        <div class="loader"></div>

    </div>

    <!-- ========================= -->
    <!-- PANTALLA BIENVENIDA -->
    <!-- ========================= -->

    <section id="welcome">

        <div class="welcome-overlay">

            <h3 id="welcomeText">

                Estás Invitado

            </h3>

            <h1 id="eventName">

                Invitación

            </h1>

            <button id="btnOpen">

                Abrir Invitación

            </button>

        </div>

    </section>

    <!-- ========================= -->
    <!-- HERO -->
    <!-- ========================= -->

    <header id="hero">

        <video id="heroVideo" autoplay muted loop playsinline>

            <source src="" type="video/mp4">

        </video>

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <h4 id="heroSubtitle"></h4>

            <h1 id="heroTitle"></h1>

            <p id="heroDate"></p>

            <a href="#countdown" class="scrollDown">

                <i class="fa-solid fa-angle-down"></i>

            </a>

        </div>

    </header>

    <!-- ========================= -->
    <!-- CUENTA REGRESIVA -->
    <!-- ========================= -->

    <section id="countdown" data-aos="fade-up">

        <h2>

            Faltan...

        </h2>

        <div class="countdown-grid">

            <div>

                <span id="days">00</span>

                <small>Días</small>

            </div>

            <div>

                <span id="hours">00</span>

                <small>Horas</small>

            </div>

            <div>

                <span id="minutes">00</span>

                <small>Minutos</small>

            </div>

            <div>

                <span id="seconds">00</span>

                <small>Segundos</small>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- INFORMACIÓN -->
    <!-- ========================= -->

    <section id="information" data-aos="fade-up">

        <div class="glass-card">

            <i class="fa-solid fa-calendar-days"></i>

            <h3>Fecha</h3>

            <p id="infoDate"></p>

        </div>

        <div class="glass-card">

            <i class="fa-solid fa-clock"></i>

            <h3>Hora</h3>

            <p id="infoHour"></p>

        </div>

        <div class="glass-card">

            <i class="fa-solid fa-location-dot"></i>

            <h3>Lugar</h3>

            <p id="infoPlace"></p>

        </div>

    </section>

    <!-- ========================= -->
    <!-- GALERÍA -->
    <!-- ========================= -->

    <section id="gallery" data-aos="zoom-in">

        <h2>

            Galería

        </h2>

        <div class="swiper mySwiper">

            <div class="swiper-wrapper">

                <!-- script.js -->

            </div>

            <div class="swiper-pagination"></div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- MAPA -->
    <!-- ========================= -->

    <section id="map" data-aos="fade-up">

        <h2>

            Ubicación

        </h2>

        <iframe id="googleMap" loading="lazy" allowfullscreen>

        </iframe>

    </section>

    <!-- ========================= -->
    <!-- MÚSICA -->
    <!-- ========================= -->

    <button id="musicButton">

        <i class="fa-solid fa-music"></i>

    </button>

    <audio id="music" loop>

    </audio>

    <!-- ========================= -->
    <!-- WHATSAPP -->
    <!-- ========================= -->

    <section id="confirmation" data-aos="fade-up">

        <h2>

            ¿Nos acompañas?

        </h2>

        <a id="btnWhatsapp" target="_blank">

            <i class="fa-brands fa-whatsapp"></i>

            Confirmar Asistencia

        </a>

    </section>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <footer>

        <p id="footerText">

        </p>

    </footer>

    <!-- ========================= -->
    <!-- LIBRERÍAS -->
    <!-- ========================= -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <!-- ========================= -->
    <!-- CONFIG -->
    <!-- ========================= -->

    <script src="config.js"></script>

    <!-- ========================= -->
    <!-- SCRIPT -->
    <!-- ========================= -->

    <script src="script.js"></script>

</body>

</html>
